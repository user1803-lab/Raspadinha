<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Posto Certo 6 - Raspadinha Premiada</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --p-blue: #004a99;
            --p-green: #28a745;
            --p-yellow: #ffc107;
            --p-white: #ffffff;
            --p-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Fundo com imagem do posto */
            background-image: url('https://i.postimg.cc/sDvdD5T0/IMG-20260415-WA0014(1).jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--p-dark);
            overflow: hidden;
        }

        /* Overlay escuro para garantir leitura */
        body::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0, 74, 153, 0.7); z-index: 0;
        }

        .ticket-wrapper {
            position: relative; z-index: 1; background: var(--p-white);
            width: 90%; max-width: 360px; border-radius: 20px;
            padding: 25px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .ticket-header { text-align: center; margin-bottom: 20px; }
        .ticket-header h1 { font-size: 22px; margin: 0; color: var(--p-blue); text-transform: uppercase; }

        .scratch-container {
            position: relative; width: 300px; height: 150px;
            margin: 0 auto; border-radius: 10px; overflow: hidden;
            border: 4px solid var(--p-yellow); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Bolinha de guia (Guia de raspagem) */
        .visual-cue {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.4); border: 2px solid white;
            border-radius: 50%; z-index: 3; pointer-events: none;
            animation: moveBall 2s infinite ease-in-out;
        }
        @keyframes moveBall {
            0%, 100% { transform: translate(-100%, -50%); }
            50% { transform: translate(50%, -50%); }
        }

        .prize-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #eee; z-index: 1;
        }

        .prize-text { font-size: 20px; font-weight: 800; color: var(--p-green); }

        canvas { position: absolute; top: 0; left: 0; z-index: 4; cursor: pointer; touch-action: none; }

        /* Nome do Posto embaixo */
        .station-name {
            text-align: center; font-weight: 900; color: var(--p-blue);
            margin-top: 15px; font-size: 18px; text-transform: uppercase;
        }

        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--p-green); transition: width 0.1s; }

        /* Modal */
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; align-items: center; justify-content: center; }
        .coupon-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
        .btn-claim { background: var(--p-yellow); border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="ticket-wrapper">
    <div class="ticket-header">
        <h1>Sorteio Premiado</h1>
    </div>

    <div class="scratch-container" id="scratch-box">
        <div class="visual-cue" id="cue"></div>
        <div class="prize-content">
            <span class="prize-text" id="prize-text">Carregando...</span>
        </div>
        <canvas id="scratch-canvas" width="300" height="150"></canvas>
    </div>
    
    <div class="station-name">Posto Certo 6</div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="result-modal">
    <div class="coupon-box">
        <h2 id="modal-title">Parabéns!</h2>
        <p id="modal-desc"></p>
        <button class="btn-claim" onclick="window.location.reload()">Finalizar</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const cue = document.getElementById('cue');
        
        const premios = [
            { nome: "Tente novamente!", win: false },
            { nome: "1 Água Mineral", win: true },
            { nome: "1 Picolé", win: true }
        ];

        const sorteado = premios[Math.floor(Math.random() * premios.length)];
        document.getElementById('prize-text').innerText = sorteado.nome;

        // Desenhar Raspadinha (Azul do Posto)
        ctx.fillStyle = '#004a99';
        ctx.fillRect(0, 0, 300, 150);
        ctx.fillStyle = '#ffc107'; // Amarelo do Posto
        ctx.font = 'bold 20px Inter'; ctx.textAlign = 'center';
        ctx.fillText('RASPE AQUI', 150, 85);

        let finished = false;

        function scratch(e) {
            if(finished) return;
            
            // Remove guia visual
            cue.style.display = 'none';

            // Feedback Tátil (Vibração)
            if (navigator.vibrate) navigator.vibrate(10);

            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();

            // Progresso
            const data = ctx.getImageData(0,0,300,150).data;
            let clear = 0;
            for(let i=3; i<data.length; i+=4) if(data[i] == 0) clear++;
            const pct = (clear / (data.length/4)) * 100;
            document.getElementById('progress-fill').style.width = Math.min(pct * 2, 100) + '%';
            
            if(pct > 40 && !finished) {
                finished = true;
                document.getElementById('result-modal').style.display = 'flex';
                document.getElementById('modal-desc').innerText = sorteado.nome;
                if(sorteado.win) {
                    document.getElementById('modal-title').innerText = "Você Ganhou! 🎉";
                    confetti({ particleCount: 150, spread: 70 });
                } else {
                    document.getElementById('modal-title').innerText = "Poxa vida...";
                }
            }
        }

        canvas.onmousedown = () => canvas.onmousemove = scratch;
        canvas.ontouchmove = (e) => { e.preventDefault(); scratch(e); };
    });
</script>
</body>
</html>
