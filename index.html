<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Posto Certo 6 - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --blue: #004a99;
            --green: #28a745;
            --yellow: #ffc107;
            --white: #ffffff;
            --dark: #0a192f;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Fundo Animado */
        .bg-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, var(--blue), transparent 70%); opacity: 0.3; }

        /* Cartão */
        .ticket { background: var(--white); width: 90%; max-width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; z-index: 1; position: relative; }
        
        .header h1 { color: var(--blue); margin: 0; font-size: 26px; text-transform: uppercase; }
        
        /* Raspadinha */
        .scratch-area { position: relative; width: 300px; height: 160px; margin: 20px auto; border: 4px solid var(--blue); border-radius: 10px; overflow: hidden; cursor: crosshair; }
        canvas { position: absolute; top:0; left:0; z-index: 5; touch-action: none; }
        .result-under { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #f9f9f9; flex-direction: column; }
        
        /* Mãozinha */
        .hand { position: absolute; z-index: 10; font-size: 40px; pointer-events: none; animation: move 2s infinite; }
        @keyframes move { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,20px)} }

        /* Rodapé e Timer */
        .footer { margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px; }
        .barcode { font-family: 'Libre Barcode 39 Text'; font-size: 40px; color: #333; }
        
        /* Modal */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 85%; border-top: 10px solid var(--yellow); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="ticket">
        <div class="header"><h1>Posto Certo 6</h1></div>
        <div class="scratch-area" id="box">
            <div class="hand" id="hand">🖐️</div>
            <div class="result-under" id="res">Sorteando...</div>
            <canvas id="cvs" width="300" height="160"></canvas>
        </div>
        <div class="footer">
            <div class="barcode">PC6-SORTEIO2026</div>
            <p style="font-size: 10px; color: #666;">ID: #99283-BR</p>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 id="m-title">Parabéns!</h2>
            <p id="m-desc"></p>
            <div style="background:#fee2e2; padding:10px; border-radius:10px; color:#b91c1c; margin: 15px 0;">Válido por: <b id="timer">15:00</b></div>
            <button onclick="location.reload()" style="background:var(--blue); color:white; border:none; padding:12px 30px; border-radius:50px; font-weight:bold;">Finalizar</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d', {willReadFrequently:true});
        const hand = document.getElementById('hand');
        
        // Estilo Raspadinha
        ctx.fillStyle = '#004a99'; ctx.fillRect(0,0,300,160);
        ctx.fillStyle = 'white'; ctx.font = '20px Inter'; ctx.textAlign = 'center'; ctx.fillText('RASPE AQUI', 150, 85);

        const prizes = [
            {nome: "Tente Novamente!", win: false},
            {nome: "1 Água Mineral", win: true},
            {nome: "1 Picolé", win: true}
        ];
        const sorteado = prizes[Math.floor(Math.random()*prizes.length)];
        document.getElementById('res').innerHTML = `<span style="color:${sorteado.win?'var(--green)':'red'}; font-weight:bold">${sorteado.nome}</span>`;

        let finished = false;
        function scratch(e) {
            if(finished) return;
            hand.style.display = 'none';
            if(navigator.vibrate) navigator.vibrate(10);
            
            const rect = cvs.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill();

            // Check
            const data = ctx.getImageData(0,0,300,160).data;
            let clear = 0;
            for(let i=3; i<data.length; i+=4) if(data[i] == 0) clear++;
            if(clear > 8000) {
                finished = true;
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'flex';
                    document.getElementById('m-desc').innerText = sorteado.nome;
                    if(sorteado.win) {
                        document.getElementById('m-title').innerText = "Você Ganhou! 🎉";
                        confetti({particleCount: 200});
                        startTimer();
                    } else {
                        document.getElementById('m-title').innerText = "Que pena...";
                    }
                }, 500);
            }
        }

        function startTimer() {
            let t = 900;
            setInterval(() => {
                t--;
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        cvs.onmousedown = () => cvs.onmousemove = scratch;
        cvs.ontouchmove = scratch;
    </script>
</body>
</html>
