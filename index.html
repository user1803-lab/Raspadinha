<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raspadinha Premiada - Posto Ipiranga</title>
    <!-- Fonte Moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FFD700; /* Cor da sua marca */
            --dark: #1a1a1a;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { color: #666; margin-bottom: 2rem; }

        .scratch-area {
            position: relative;
            width: 300px;
            height: 150px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #eee;
            background: #f8f8f8;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: pointer; touch-action: none; }
        
        .prize-display {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            z-index: 1;
        }

        /* Modal Premium */
        #result-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 80%;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Sorte no Posto! ⛽</h1>
        <p>Raspe e descubra seu brinde.</p>
    </div>

    <div class="scratch-area" id="scratch-container">
        <div class="prize-display" id="prize-box">
            <span id="prize-text">Carregando...</span>
        </div>
        <canvas id="scratch-canvas" width="300" height="150"></canvas>
    </div>
</div>

<!-- Modal de Sucesso -->
<div id="result-modal">
    <div class="modal-content">
        <h2 id="modal-title">Parabéns!</h2>
        <p id="modal-desc"></p>
        <button onclick="window.location.reload()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary); cursor: pointer;">Fechar</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const modal = document.getElementById('result-modal');
    
    // Probabilidades (Soma deve ser 100)
    const premios = [
        { nome: "Tente Novamente", peso: 70, win: false },
        { nome: "1 Água Mineral", peso: 20, win: true },
        { nome: "1 Picolé", peso: 10, win: true }
    ];

    function sortear() {
        let r = Math.random() * 100;
        let acum = 0;
        for(let p of premios) {
            acum += p.peso;
            if(r < acum) return p;
        }
    }

    const sorteado = sortear();
    document.getElementById('prize-text').innerText = sorteado.nome;

    // Desenhar Raspadinha
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(0, 0, 300, 150);
    ctx.fillStyle = '#333';
    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('RASPE AQUI', 150, 85);

    let isDrawing = false;
    let finished = false;

    function scratch(e) {
        if(!isDrawing || finished) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI*2);
        ctx.fill();

        // Verificar conclusão
        const data = ctx.getImageData(0,0,300,150).data;
        let count = 0;
        for(let i=3; i<data.length; i+=4) if(data[i] == 0) count++;
        
        if(count > 10000 && !finished) {
            finished = true;
            if(sorteado.win) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('modal-title').innerText = "Você Ganhou!";
            } else {
                document.getElementById('modal-title').innerText = "Poxa vida...";
            }
            document.getElementById('modal-desc').innerText = sorteado.nome;
            setTimeout(() => modal.style.display = 'flex', 500);
        }
    }

    canvas.onmousedown = () => isDrawing = true;
    canvas.onmouseup = () => isDrawing = false;
    canvas.onmousemove = scratch;
    canvas.ontouchstart = (e) => { isDrawing = true; scratch(e); };
    canvas.ontouchend = () => isDrawing = false;
    canvas.ontouchmove = scratch;
</script>
</body>
</html>
